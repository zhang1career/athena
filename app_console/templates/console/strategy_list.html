{% extends 'console/base_list.html' %}
{% load static console_static %}
{% block title %}策略列表{% endblock %}
{% block page_title %}策略列表{% endblock %}
{% block list_title %}策略列表{% endblock %}
{% block list_container_id %}strategy-list{% endblock %}

{% block extra_js %}
<script src="{% static_ver 'console/js/api.js' %}"></script>
<script src="{% static_ver 'console/js/list-page.js' %}"></script>
<script>
ConsoleListPage.run({
  apiUrl: '/api/v1/strategies',
  containerId: 'strategy-list',
  listResponseKey: 'data',
  emptyMessage: '暂无注册策略',
  columns: [
    { key: 'id', label: 'ID', type: 'text' },
    { key: 'name', label: '名称', type: 'text' },
    { key: 'version', label: '版本', type: 'text' },
    { key: 'params_schema', label: 'params_schema', type: 'truncate', truncateLen: 120 },
  ],
});
</script>
{% endblock %}
