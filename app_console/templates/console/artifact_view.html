{% extends 'console/base.html' %}
{% load static console_static %}
{% block title %}Artifact 可视化{% endblock %}
{% block page_title %}Artifact 可视化{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/console/" class="text-blue-600 hover:underline">← 返回控制台</a>
</div>
<div class="card max-w-2xl">
  <div class="card-header"><h3 class="font-semibold">查看训练结果 artifact</h3></div>
  <div class="card-body space-y-3">
    <div class="flex gap-2 items-end">
      <div class="flex-1">
        <label class="block text-sm text-gray-600 mb-1">文件名</label>
        <input id="artifact-filename" type="text" class="border border-gray-300 rounded px-3 py-2 w-full" placeholder="worldcup_odds_group_winner.pkl" value="worldcup_odds_group_winner.pkl" />
      </div>
      <button type="button" id="btn-load" class="btn btn-primary">加载</button>
    </div>
    <div id="artifact-result" class="mt-4"></div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function escapeHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function bar(label, value, maxVal) {
  maxVal = maxVal != null ? maxVal : 1;
  var pct = (typeof value === 'number' && maxVal > 0) ? Math.min(100, (value / maxVal) * 100) : 0;
  var fmt = function(v) { return (typeof v === 'number') ? (v * 100).toFixed(1) + '%' : (v != null ? String(v) : '-'); };
  return '<div class="mb-3"><div class="flex justify-between text-sm mb-0.5"><span class="text-gray-600">' + escapeHtml(label) + '</span><span class="font-medium">' + fmt(value) + '</span></div><div class="h-2.5 bg-gray-200 rounded overflow-hidden"><div class="h-full bg-blue-500 rounded transition-all" style="width:' + pct + '%"></div></div></div>';
}
document.getElementById('btn-load').onclick = function() {
  var filename = (document.getElementById('artifact-filename').value || '').trim();
  if (!filename) { alert('请输入文件名'); return; }
  if (!filename.endsWith('.pkl')) filename += '.pkl';
  var resultEl = document.getElementById('artifact-result');
  resultEl.innerHTML = '<p class="text-gray-500">加载中…</p>';
  fetch('/api/v1/artifacts?filename=' + encodeURIComponent(filename), { credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.errorCode !== 0) {
        resultEl.innerHTML = '<p class="text-red-600">' + escapeHtml(j.message || '加载失败') + '</p>';
        return;
      }
      var art = (j.data && j.data.artifact) || {};
      var theta = art.theta || art;
      if (art.strategy_id === 'odds_baseline_group_winner' && theta && typeof theta === 'object') {
        resultEl.innerHTML = '<div class="rounded-lg border border-amber-200 bg-amber-50/50 p-4"><h4 class="font-semibold text-amber-800 mb-3">📊 赔率相关度 θ (odds_baseline_group_winner)</h4>' +
          bar('AUC', theta.auc, 1) +
          bar('Brier（越小越好，0.25=随机）', 1 - ((theta.brier || 0.25) / 0.25), 1) +
          bar('Spearman 相关系数', (theta.spearman || 0) + 0.5, 1) +
          bar('建议权重 suggested_weight', theta.suggested_weight, 1) +
          '<p class="text-xs text-gray-500 mt-2">文件: ' + escapeHtml(j.data.filename || filename) + '</p></div>';
      } else {
        resultEl.innerHTML = '<pre class="text-sm overflow-x-auto p-3 bg-gray-50 rounded">' + escapeHtml(JSON.stringify(art, null, 2)) + '</pre>';
      }
    })
    .catch(function(e) {
      resultEl.innerHTML = '<p class="text-red-600">请求失败: ' + escapeHtml(e.message) + '</p>';
    });
};
// 若 URL 带 filename 参数则自动加载
var match = /[?&]filename=([^&]+)/.exec(window.location.search);
if (match) {
  document.getElementById('artifact-filename').value = decodeURIComponent(match[1]);
  document.getElementById('btn-load').click();
}
</script>
{% endblock %}
